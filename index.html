<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CJ投决系统 · 尽调投决系统</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f5f6f7;color:#1f2a3a;font-size:14px}
    a{text-decoration:none;color:#3370ff}
    .app{display:flex;min-height:100vh}
    .sidebar{width:220px;background:#fff;border-right:1px solid #e8eaed;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
    .sidebar-header{padding:20px 16px;border-bottom:1px solid #e8eaed}
    .sidebar-header h1{font-size:16px;font-weight:600;color:#3370ff;display:flex;align-items:center;gap:8px}
    .sidebar-header h1 .logo{width:28px;height:28px;background:#3370ff;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
    .sidebar-nav{flex:1;padding:12px 8px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#4e5a6b;font-size:14px;transition:all .15s;margin-bottom:2px}
    .nav-item:hover{background:#f0f2f5}
    .nav-item.active{background:#e8f0ff;color:#3370ff;font-weight:500}
    .nav-item .icon{font-size:18px;width:22px;text-align:center}
    .nav-item .badge{margin-left:auto;background:#e8eaed;color:#4e5a6b;font-size:11px;padding:1px 8px;border-radius:10px}
    .sidebar-footer{padding:12px 8px;border-top:1px solid #e8eaed}
    .sidebar-footer .nav-item{color:#8c9aa8;font-size:12px}
    .main{margin-left:220px;flex:1;padding:0}
    .topbar{background:#fff;border-bottom:1px solid #e8eaed;padding:12px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .topbar h2{font-size:18px;font-weight:600}
    .topbar-actions{display:flex;gap:12px;align-items:center}
    .topbar .user-avatar{width:32px;height:32px;border-radius:50%;background:#3370ff;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer}
    .topbar .sync-btn{background:none;border:1px solid #d0d5dd;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px;color:#4e5a6b}
    .topbar .sync-btn:hover{background:#f5f6f7}
    .topbar .sync-btn.loading{opacity:0.6;pointer-events:none}
    .content{padding:24px 32px}
    .loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.8);z-index:999;display:flex;align-items:center;justify-content:center;font-size:16px;color:#4e5a6b}
    .loading-overlay.hidden{display:none}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:6px;border:1px solid transparent;font-size:14px;cursor:pointer;transition:all .15s;font-weight:500}
    .btn-primary{background:#3370ff;color:#fff;border-color:#3370ff}
    .btn-primary:hover{background:#2857d9}
    .btn-secondary{background:#fff;color:#4e5a6b;border-color:#d0d5dd}
    .btn-secondary:hover{background:#f5f6f7}
    .btn-success{background:#00b578;color:#fff;border-color:#00b578}
    .btn-warning{background:#ff8800;color:#fff;border-color:#ff8800}
    .btn-sm{padding:4px 12px;font-size:12px}
    .card{background:#fff;border-radius:12px;border:1px solid #e8eaed;padding:20px;margin-bottom:16px}
    .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .card-header h3{font-size:15px;font-weight:600}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
    .stat-card{background:#fff;border-radius:12px;border:1px solid #e8eaed;padding:20px}
    .stat-card .label{font-size:12px;color:#8c9aa8;margin-bottom:4px}
    .stat-card .value{font-size:28px;font-weight:700;color:#1f2a3a}
    .table{width:100%;border-collapse:collapse}
    .table th{text-align:left;padding:12px 16px;font-size:12px;color:#8c9aa8;font-weight:500;border-bottom:1px solid #e8eaed}
    .table td{padding:14px 16px;border-bottom:1px solid #f0f2f5;font-size:14px}
    .table tr:hover td{background:#fafbfc}
    .table .status{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:10px;font-size:12px}
    .status.done{background:#e8f8f0;color:#00b578}
    .status.analyzing{background:#fff3e0;color:#ff8800}
    .status.pending{background:#f0f2f5;color:#8c9aa8}
    .status.draft{background:#e8f0ff;color:#3370ff}
    .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;background:#f0f2f5;color:#4e5a6b;margin:0 2px}
    .tag.space{background:#e8f0ff;color:#3370ff}
    .tag.lowalt{background:#e8f8f0;color:#00b578}
    .tag.defense{background:#fff3e0;color:#cc6600}
    .tag.ai{background:#f0e8ff;color:#7b61ff}
    .tag.abbr{background:#e8eaed;color:#4e5a6b;font-size:11px}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#4e5a6b}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid #d0d5dd;border-radius:8px;font-size:14px;outline:none;transition:border .15s;font-family:inherit}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#3370ff;box-shadow:0 0 0 2px rgba(51,112,255,.12)}
    .form-group textarea{resize:vertical;min-height:80px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .tabs{display:flex;gap:0;border-bottom:1px solid #e8eaed;margin-bottom:20px}
    .tab{padding:10px 20px;cursor:pointer;color:#8c9aa8;font-size:14px;border-bottom:2px solid transparent;transition:all .15s}
    .tab:hover{color:#4e5a6b}
    .tab.active{color:#3370ff;border-bottom-color:#3370ff;font-weight:500}
    .tab-content{display:none}
    .tab-content.active{display:block}
    .module-card{border:1px solid #e8eaed;border-radius:10px;margin-bottom:12px;overflow:hidden}
    .module-header{padding:14px 16px;background:#fafbfc;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:500}
    .module-header:hover{background:#f0f2f5}
    .module-body{padding:16px;display:none;border-top:1px solid #e8eaed}
    .module-body.open{display:block}
    .module-body p{line-height:1.7;color:#4e5a6b;margin-bottom:8px}
    .risk-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f0f2f5}
    .risk-item:last-child{border-bottom:none}
    .risk-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .risk-icon.red{background:#fff1f0}
    .risk-icon.yellow{background:#fff7e6}
    .risk-content{flex:1}
    .risk-content .title{font-weight:500;margin-bottom:4px}
    .risk-content .desc{font-size:13px;color:#6b7a8a;line-height:1.5}
    .risk-tag{font-size:11px;padding:1px 6px;border-radius:4px;margin-left:8px}
    .risk-tag.high{background:#fff1f0;color:#f53f3f}
    .risk-tag.mid{background:#fff7e6;color:#ff8800}
    .report-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
    .chat-box{border:1px solid #e8eaed;border-radius:10px;overflow:hidden}
    .chat-msg{padding:12px 16px;border-bottom:1px solid #f0f2f5}
    .chat-msg:last-child{border-bottom:none}
    .chat-msg .sender{font-size:12px;color:#8c9aa8;margin-bottom:4px}
    .chat-msg .sender .name{font-weight:500;color:#1f2a3a}
    .chat-msg .text{line-height:1.6}
    .chat-input{display:flex;gap:8px;padding:12px;border-top:1px solid #e8eaed}
    .chat-input input{flex:1;border:1px solid #d0d5dd;border-radius:6px;padding:8px 12px;outline:none}
    .chat-input input:focus{border-color:#3370ff}
    .upload-zone{border:2px dashed #d0d5dd;border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .2s}
    .upload-zone:hover{border-color:#3370ff;background:#f8faff}
    .text-muted{color:#8c9aa8}
    .text-danger{color:#f53f3f}
    .text-success{color:#00b578}
    .flex{display:flex}
    .flex-center{align-items:center}
    .gap-8{gap:8px}
    .gap-12{gap:12px}
    @media(max-width:768px){
      .sidebar{display:none}
      .main{margin-left:0}
      .content{padding:16px}
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .form-row{grid-template-columns:1fr}
      .topbar{padding:12px 16px}
    }
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;display:none;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:16px;width:600px;max-width:90vw;max-height:85vh;overflow-y:auto;padding:32px}
    .modal h2{font-size:18px;margin-bottom:20px}
  </style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1><span class="logo">CJ</span> CJ投决系统</h1>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard')"><span class="icon">📊</span> 项目看板<span class="badge" id="project-count">0</span></div>
      <div class="nav-item" data-page="new-project" onclick="switchPage('new-project')"><span class="icon">➕</span> 新建项目</div>
      <div class="nav-item" data-page="project-detail" onclick="switchPage('project-detail')" id="nav-detail" style="display:none"><span class="icon">📋</span> 项目详情</div>
      <div style="margin:8px 0;border-top:1px solid #e8eaed"></div>
      <div class="nav-item" data-page="red-team" onclick="switchPage('red-team')"><span class="icon">🔴</span> 红队报告</div>
      <div class="nav-item" data-page="ic-memo" onclick="switchPage('ic-memo')"><span class="icon">📝</span> 投决材料</div>
      <div class="nav-item" data-page="simulator" onclick="switchPage('simulator')"><span class="icon">🎯</span> 投决会模拟</div>
    </nav>
    <div class="sidebar-footer"><div class="nav-item" style="font-size:12px">v1.0 · CJ投决系统</div></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <h2 id="page-title">项目看板</h2>
      <div class="topbar-actions">
        <button class="sync-btn" onclick="refreshData()" id="sync-btn">🔄 同步数据</button>
        <button class="btn btn-primary btn-sm" onclick="switchPage('new-project')">+ 新建项目</button>
        <button class="btn btn-warning btn-sm" onclick="requestAnalysis()" id="request-btn" title="在项目详情页点击，生成分析请求消息">🤖 请求分析</button>
      </div>
    </header>
    <div class="content" id="page-content"></div>
  </main>
</div>
<div class="loading-overlay" id="loading-overlay"><div>⏳ 数据加载中...</div></div>

<script>
let APP_DATA={projects:[]},currentProject=null,currentPage='dashboard';
const DATA_URL='data/projects.json';

async function loadData(){
  document.getElementById('loading-overlay').classList.remove('hidden');
  try{
    const r=await fetch(DATA_URL+'?t='+Date.now());
    if(r.ok)APP_DATA=await r.json();
  }catch(e){console.log('load fail',e)}
  document.getElementById('loading-overlay').classList.add('hidden');
  updateUI();
}
async function refreshData(){
  const b=document.getElementById('sync-btn');b.textContent='🔄 同步中...';b.classList.add('loading');
  await loadData();b.textContent='🔄 同步数据';b.classList.remove('loading');
}
function getProject(id){return APP_DATA.projects.find(p=>p.id==id)}
function pName(p){return(p.companyFullName||p.name)+'（'+p.name+'）'}
function pShort(p){return p.companyFullName?p.name:''}

function switchPage(page,pid){
  if(pid)currentProject=pid;currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=document.querySelector('.nav-item[data-page="'+page+'"]');if(el)el.classList.add('active');
  const t={dashboard:'项目看板','new-project':'新建项目','project-detail':'项目详情','red-team':'红队报告','ic-memo':'投决材料','simulator':'投决会模拟'};
  document.getElementById('page-title').textContent=t[page]||'项目看板';
  document.getElementById('nav-detail').style.display=(page==='project-detail'||page==='red-team'||page==='ic-memo')?'block':'none';
  updateUI();
}
function openProject(id){currentProject=id;switchPage('project-detail')}
function updateUI(){
  const c=document.getElementById('page-content');c.innerHTML=R();
  if(currentPage==='project-detail'&&getProject(currentProject))renderTabs(getProject(currentProject));
  document.getElementById('project-count').textContent=APP_DATA.projects.length;
}
function R(){switch(currentPage){
  case'dashboard':return Pd();
  case'new-project':return Pn();
  case'project-detail':return Pdt(getProject(currentProject));
  case'red-team':return Pr();
  case'ic-memo':return Pi();
  case'simulator':return Ps();
  default:return Pd();
}}

// Dashboard
function Pd(){
  const p=APP_DATA.projects;
  const active=p.filter(x=>x.status==='draft'||x.status==='analyzing').length;
  const done=p.filter(x=>x.status==='done').length;
  const pending=p.filter(x=>x.status==='pending').length;
  return '<div style="margin-bottom:16px;background:#fff;border-radius:12px;border:1px solid #e8eaed;padding:16px 20px;display:flex;align-items:center;justify-content:space-between">'+
    '<div><h3 style="font-size:16px;margin-bottom:4px;">CJ\u6295\u51b3\u7cfb\u7edf</h3><p class="text-muted" style="font-size:13px;">\u5168\u90e8\u9879\u76ee\u6570: '+p.length+'</p></div>'+
    '<button class="btn btn-primary" onclick="switchPage(\'new-project\')">+ \u65b0\u5efa\u9879\u76ee</button></div>'+
    '<div class="stats-grid">'+
    '<div class="stat-card"><div class="label">\u8fdb\u884c\u4e2d\u9879\u76ee</div><div class="value">'+active+'</div><div class="sub">\u603b\u8ba1 '+p.length+' \u4e2a\u9879\u76ee</div></div>'+
    '<div class="stat-card"><div class="label">\u5df2\u5b8c\u6210\u5206\u6790</div><div class="value">'+done+'</div><div class="sub">\u5f85\u4e0a\u4f1a</div></div>'+
    '<div class="stat-card"><div class="label">\u5f85\u8865\u5145\u6750\u6599</div><div class="value">'+pending+'</div><div class="sub"><span class="text-danger">\u9700\u8ddf\u8fdb</span></div></div>'+
    '<div class="stat-card"><div class="label">\u6700\u65b0\u66f4\u65b0</div><div class="value" style="font-size:18px">'+(p.length?p[0].name:'\u2014')+'</div></div></div>'+
    '<div class="card"><div class="card-header"><h3>\u9879\u76ee\u5217\u8868</h3></div>'+
    (p.length===0?'<div class="text-muted" style="text-align:center;padding:40px 0">\u6682\u65e0\u9879\u76ee\uff0c\u70b9\u51fb\u4e0a\u65b9\u201c+\u65b0\u5efa\u9879\u76ee\u201d\u5f00\u59cb</div>':
    '<table class="table"><thead><tr><th>\u516c\u53f8\u5168\u79f0</th><th>\u7b80\u79f0</th><th>\u8d5b\u9053</th><th>\u8f6e\u6b21</th><th>\u72b6\u6001</th><th>\u8fdb\u5ea6</th><th>\u64cd\u4f5c</th></tr></thead><tbody>'+
    p.map(function(x){
      return '<tr style="cursor:pointer" onclick="this.querySelector('.btn-primary').click()">'+
      '<td><strong>'+x.companyFullName+'</strong><br><span class="text-muted" style="font-size:12px">'+(x.description||'')+'</span></td>'+
      '<td><span class="tag abbr">'+x.name+'</span></td>'+
      '<td><span class="tag '+x.sector+'">'+x.sectorLabel+'</span></td>'+
      '<td>'+x.round+'</td>'+
      '<td><span class="status '+x.status+'">'+x.statusLabel+'</span></td>'+
      '<td>'+x.modulesDone+'/'+x.modulesTotal+'</td>'+
      '<td><button class="btn btn-sm btn-primary" onclick="openProject(\''+x.id+'\')">\u67e5\u770b</button></td></tr>';
    }).join('')+
    '</tbody></table>')+'</div>';
}

// New Project
function Pn(){
  return '<div class="card"><div class="card-header"><h3>新建项目</h3></div>'+
    '<div class="form-row"><div class="form-group"><label>公司全称 *</label><input type="text" placeholder="如：白鲸航线（北京）科技有限公司" id="new-fullname"></div>'+
    '<div class="form-group"><label>公司简称（用于显示）*</label><input type="text" placeholder="如：白鲸航线" id="new-name"></div></div>'+
    '<div class="form-row"><div class="form-group"><label>赛道 *</label><select id="new-sector"><option value="">请选择</option><option value="space">🚀 商业航天</option><option value="lowalt">🛩️ 低空经济</option><option value="defense">🎯 国防军工</option><option value="ai">🧠 人工智能</option><option value="embodied">🤖 具身智能</option></select></div>'+
    '<div class="form-group"><label>轮次</label><select id="new-round"><option>天使轮</option><option>Pre-A</option><option>A轮</option><option>A+轮</option><option>B轮</option><option>C轮</option><option>D轮</option><option>E轮</option><option>F轮</option><option>PRE-IPO轮</option><option>其他</option></select></div></div>'+
    '<div class="form-row"><div class="form-group"><label>拟投资金额（万元）</label><input type="text" id="new-amount" placeholder="如：5000"></div>'+
    '<div class="form-group"><label>分析模式</label><select id="new-mode"><option value="fast">⚡ 快速扫描</option><option value="deep" selected>🔬 深度尽调</option><option value="track">📡 持续跟踪</option></select></div></div>'+
    '<div class="form-group"><label>项目简介</label><textarea id="new-desc" rows="2" placeholder="公司做什么、核心产品、目标市场..."></textarea></div>'+
    '<div class="card" style="background:#f8faff;border:1px solid #d0e0ff;"><div class="card-header"><h3>📎 尽调材料提交</h3></div>'+
    '<div class="form-group"><label>① 飞书文档链接</label><input type="text" id="new-feishu-url" placeholder="粘贴飞书文档/多维表格/云盘链接">'+
    '<p class="text-muted" style="font-size:12px;margin-top:4px">我收到后直接用 feishu_doc 读取内容</p></div>'+
    '<div class="form-group"><label>② 或发文件到群里</label><div class="upload-zone" style="padding:16px;cursor:default;background:#fff">📁 把 PDF / DOCX / Excel 发到群里 @我 → 我读取分析</div></div></div>'+
    '<div style="margin-top:16px;padding:12px 14px;background:#fff8e6;border-radius:8px;border:1px solid #ffe0a0">'+
    '<p style="font-size:12px;color:#cc6600"><strong>💡 创建后：</strong>在群里 @我 说「帮我分析XXX」→ 我分析完→ 你点「同步数据」刷新看结果</p></div>'+
    '<div style="margin-top:16px;display:flex;gap:12px"><button class="btn btn-primary" onclick="createProject()">🚀 创建项目</button><button class="btn btn-secondary" onclick="switchPage(\'dashboard\')">取消</button></div></div>';
}
function createProject(){
  const name=document.getElementById('new-name').value.trim();
  const full=document.getElementById('new-fullname').value.trim();
  const feishuUrl=document.getElementById('new-feishu-url').value.trim();
  const selSector=document.getElementById('new-sector');
  const selRound=document.getElementById('new-round');
  if(!full||!name){alert('\u8bf7\u586b\u5199\u516c\u53f8\u5168\u79f0\u548c\u7b80\u79f0');return}
  const secLabels={space:'\u5546\u4e1a\u822a\u5929',lowalt:'\u4f4e\u7a7a\u7ecf\u6d4e',defense:'\u56fd\u9632\u519b\u5de5',ai:'\u4eba\u5de5\u667a\u80fd',embodied:'\u5177\u8eab\u667a\u80fd'};
  const np={
    id:String(Date.now()),name,companyFullName:full,
    description:document.getElementById('new-desc').value||'',sector:selSector.value,
    sectorLabel:secLabels[selSector.value]||'\u5176\u4ed6',round:selRound.value,
    amount:parseInt(document.getElementById('new-amount').value)||0,
    status:'pending',statusLabel:'\u5f85\u5206\u6790',modulesDone:0,modulesTotal:8,
    createdAt:new Date().toISOString().slice(0,10),modules:[],materials:[],risks:[],
    timeline:[{date:new Date().toLocaleString('zh-CN'),event:'\u9879\u76ee\u521b\u5efa',active:true}],
    feishuUrl:feishuUrl||''
  };
  APP_DATA.projects.unshift(np);
  let msg='\u2705 \u5df2\u521b\u5efa\uff1a'+full+'\uff08'+name+'\uff09';
  if(feishuUrl)msg+='\n\ud83d\udcce \u6587\u6863\u94fe\u63a5\u5df2\u8bb0\u5f55';

// Red Team
function Pr(){
  const proj=getProject(currentProject);
  const risks=(proj&&proj.risks)?proj.risks:[];
  if(!proj||risks.length===0)return '<div class="card"><div class="text-muted" style="text-align:center;padding:40px">暂无红队报告</div></div>';
  const icons={high:'🔴',mid:'🟡'};
  return '<div class="card" style="border-left:4px solid #f53f3f"><div class="flex flex-center gap-12" style="margin-bottom:12px"><span style="font-size:24px">🔴</span><div><h3 style="font-size:16px">红队评估报告 · '+pName(proj)+'</h3><p class="text-muted" style="font-size:12px">独立于主分析，AI 主动挑战关键假设</p></div></div>'+
    risks.map(r=>'<div class="risk-item"><div class="risk-icon '+(r.level==='high'?'red':'yellow')+'">'+(icons[r.level]||'🟡')+'</div><div class="risk-content"><div class="title">'+r.title+' <span class="risk-tag '+r.level+'">'+(r.level==='high'?'高':'中')+'</span></div><div class="desc">'+r.desc+'</div></div></div>').join('')+
    '<div class="report-actions"><button class="btn btn-warning btn-sm" onclick="alert(\'导出功能开发中\')">📋 导出红队报告</button><button class="btn btn-secondary btn-sm" onclick="switchPage(\'simulator\')">🎯 模拟问答</button></div></div>';
}

// Simulator
function Ps(){
  return '<div class="card"><div class="flex flex-center gap-12" style="margin-bottom:16px"><span style="font-size:24px">🎯</span><div><h3 style="font-size:16px">投决会模拟问答</h3><p class="text-muted" style="font-size:12px">我扮演投决委，你来回答，我帮你优化话术</p></div></div>'+

    '<div class="chat-box" id="sim-chat"><div class="chat-msg"><div class="sender"><span class="name">🤖 投决委（AI）</span></div><div class="text">选择项目开始模拟问答。</div></div>'+
    '<div class="chat-input"><input type="text" id="sim-input" placeholder="输入回答..."><button class="btn btn-sm btn-primary" onclick="sendSim()">发送</button></div></div></div>';
}
function updateSim(id){
  const p=getProject(id);if(!p)return;
  const c=document.getElementById('sim-chat');
  c.innerHTML='<div class="chat-msg"><div class="sender"><span class="name">🤖 投决委（AI）</span></div><div class="text">已切换至 <strong>'+pName(p)+'</strong>。<br><br>第一个问题：这个项目的核心投资逻辑是什么？为什么这个时点值得下手？</div></div>'+
    '<div class="chat-input"><input type="text" id="sim-input" placeholder="输入回答..."><button class="btn btn-sm btn-primary" onclick="sendSim()">发送</button></div>';
}
function sendSim(){
  const inp=document.getElementById('sim-input');if(!inp||!inp.value.trim())return;
  const t=inp.value.trim();inp.value='';
  const c=document.getElementById('sim-chat');
  const u=document.createElement('div');u.className='chat-msg';
  u.innerHTML='<div class="sender"><span class="name">🧑‍💼 你</span></div><div class="text">'+t+'</div>';
  c.insertBefore(u,c.lastElementChild);
  setTimeout(()=>{
    const a=document.createElement('div');a.className='chat-msg';
    a.innerHTML='<div class="sender"><span class="name">🤖 投决委（AI）</span></div><div class="text">回答有内容，建议用具体数据增强说服力。<br><br><strong>追问：</strong>竞争对手也在融资，你怎么看竞争格局？</div>';
    c.insertBefore(a,c.lastElementChild);
  },800);
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
  document.querySelector('.tab[data-tab="'+t+'"]').classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
}
function toggleModule(el){const b=el.nextElementSibling;b.classList.toggle('open');el.querySelector('span:last-child').textContent=b.classList.contains('open')?'▼':'▶'}
function toggleMemo(el){const b=el.nextElementSibling;b.classList.toggle('open');el.querySelector('span:last-child').textContent=b.classList.contains('open')?'▼':'▶'}

loadData();


function deepAnalysis(){
  const proj=getProject(currentProject);
  if(!proj){alert('\u8bf7\u5148\u9009\u62e9\u4e00\u4e2a\u9879\u76ee');return;}
  const msg='\ud83d\udd2c \u5e2e\u6211\u6df1\u5ea6\u5206\u6790 '+proj.name+'\uff08'+(proj.companyFullName||'')+'\uff09';
  if(proj.feishuUrl)msg+='\n\ud83d\udcce \u6587\u6863\uff1a'+proj.feishuUrl;
  const ta=document.createElement('textarea');
  ta.value=msg;document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');alert('\u2705 \u5df2\u590d\u5236\uff01\n\u5728\u7fa4\u91cc\u53d1\uff1a'+msg);}
  catch(e){prompt('\u590d\u5236\u53d1\u5230\u7fa4\u91cc\uff1a',msg);}
  document.body.removeChild(ta);
}

function requestAnalysis(){
  const proj = getProject(currentProject);
  if(!proj){alert('请先选择一个项目');return;}
  const msg = '帮我分析' + proj.name + '（' + (proj.companyFullName||'') + '）\n赛道：' + proj.sectorLabel + '\n轮次：' + proj.round + '\n材料已准备';
  const textarea = document.createElement('textarea');
  textarea.value = '🤖 帮我分析 ' + proj.name + '（详情在建项目看板）';
  document.body.appendChild(textarea);
  textarea.select();
  try{
    document.execCommand('copy');
    alert('✅ 已复制！\n\n请在群里发：\n「🤖 帮我分析 ' + proj.name + '」\n\n我就开始干活了 🚀');
  }catch(e){
    prompt('复制下面这句话发到群里：', '🤖 帮我分析 ' + proj.name + '（详情在建项目看板）');
  }
  document.body.removeChild(textarea);
}
